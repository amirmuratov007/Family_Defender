name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web-and-text:
    name: Web and text checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check text encoding
        run: python scripts/check_text_encoding.py

      - name: Run web risk tests
        run: npm test

  ios-project:
    name: iOS project generation
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate

      - name: Build simulator target without signing
        run: |
          cd ios
          xcodebuild \
            -project HeimdallFamilyProtection.xcodeproj \
            -scheme HeimdallFamilyProtection \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
